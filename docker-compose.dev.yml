services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: budget_dev
      POSTGRES_USER: budget_user
      POSTGRES_PASSWORD: budget_dev_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user -d budget_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
